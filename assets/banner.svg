<svg width="1280" height="340" viewBox="0 0 1280 340" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Corporación Maximus 1999 · Departamento de Tecnología">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1280" y2="340" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0C1A5E"/>
      <stop offset="0.55" stop-color="#2030B0"/>
      <stop offset="1" stop-color="#3E7E9E"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#4080A0"/>
      <stop offset="1" stop-color="#8FD0E0"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.82" cy="0.3" r="0.6">
      <stop offset="0" stop-color="#4080A0" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#4080A0" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- fondo -->
  <rect width="1280" height="340" rx="16" fill="url(#bg)"/>
  <rect width="1280" height="340" rx="16" fill="url(#glow)"/>

  <!-- watermark geométrico (círculo del badge del logo) -->
  <circle cx="1080" cy="170" r="185" stroke="#8FD0E0" stroke-opacity="0.12" stroke-width="2" fill="none"/>
  <circle cx="1080" cy="170" r="140" stroke="#8FD0E0" stroke-opacity="0.10" stroke-width="1.5" fill="none"/>

  <!-- monograma CM estilizado (marca de agua) -->
  <g opacity="0.16" stroke="#FFFFFF" stroke-width="9" stroke-linecap="round" fill="none">
    <path d="M1035 120 A55 55 0 1 0 1035 220"/>
    <path d="M1095 220 L1095 120 L1130 175 L1165 120 L1165 220"/>
  </g>

  <!-- eyebrow -->
  <text x="72" y="96" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="21" letter-spacing="5" font-weight="600" fill="#8FD0E0">CORPORACIÓN MAXIMUS 1999, C.A.</text>

  <!-- título -->
  <text x="70" y="176" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="72" font-weight="800" fill="#FFFFFF">Departamento de Tecnología</text>

  <!-- línea de acento -->
  <rect x="74" y="208" width="150" height="5" rx="2.5" fill="url(#accent)"/>

  <!-- subtítulo -->
  <text x="74" y="256" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="27" font-weight="500" fill="#DCE7F5">Implementaciones Odoo · Desarrollo web a medida</text>

  <!-- tagline inferior -->
  <text x="74" y="300" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="17" letter-spacing="2" font-weight="600" fill="#8FD0E0">◆ CLEAN CODE ESCALABLE</text>
</svg>
